backends:
  sensenova:
    base_url: https://token.sensenova.cn/v1
    api_key: env:SENSENOVA_API_KEY
    async: false
    timeout:
      sync_generate: 600
    tool:
      name: sensenova_generate_image
      description: |
        Sensenova u1-fast 图像生成（2K 分辨率，同步模式）。
        返回换行分隔的图片 URL 列表。

        ## 参数
        - `model` (string, 必填): 固定为 `u1-fast`（sensenova-u1-fast）
        - `prompt` (string, 必填): 图像描述文本，最大 4096 tokens
        - `size` (string, 默认 `2752x1536`): 2K 分辨率，11 种宽高比之一
        - `n` (integer, 默认 1): 生成图片数量 (1-4)
      parameters:
        prompt:
          description: 图像描述文本，最大 4096 tokens。
        size:
          description: 2K 分辨率宽高（WxH）。
          default: "2752x1536"
          enum:
            - { value: "1664x2496", ratio: "2:3" }
            - { value: "2496x1664", ratio: "3:2" }
            - { value: "1760x2368", ratio: "3:4" }
            - { value: "2368x1760", ratio: "4:3" }
            - { value: "1824x2272", ratio: "4:5" }
            - { value: "2272x1824", ratio: "5:4" }
            - { value: "2048x2048", ratio: "1:1" }
            - { value: "2752x1536", ratio: "16:9" }
            - { value: "1536x2752", ratio: "9:16" }
            - { value: "3072x1376", ratio: "21:9" }
            - { value: "1344x3136", ratio: "9:21" }
        n:
          description: 生成图片数量。
          default: 1
          minimum: 1
          maximum: 4
        image:
          description: 参考图 URL / data URI / 本地路径。留空表示纯文生图。
        save_path:
          description: '可选，本地绝对文件路径。提供时自动下载并保存第一张图，返回 Saved: <path> 和 URL。'
    models:
      u1-fast: sensenova-u1-fast

  modelscope:
    base_url: https://api-inference.modelscope.cn/v1
    api_key: env:MODELSCOPE_API_KEY
    async: true
    timeout:
      request: 30
      poll_interval: 5
      max_wait: 600
    tool:
      name: modelscope_generate_image
      description: |
        ModelScope 异步图像生成（Qwen/Qwen-Image-2512、Qwen/Qwen-Image-Edit-2511）。
        提交任务后轮询，SUCCEED 时返回图片 URL 列表。

        ## 模型
        - `qwen-image-2512` → Qwen/Qwen-Image-2512（文生图）
        - `qwen-image-edit-2511` → Qwen/Qwen-Image-Edit-2511（图编辑，需提供 `image`）

        ## 参数
        - `model` (string, 必填): 模型别名
        - `prompt` (string, 必填): 图像描述
        - `size` (string, 可选): 7 种宽高比之一（见参数描述）
        - `n` (integer, 默认 1): 生成图片数量 (1-4)
        - `image` (string, 可选): 参考图 URL / data URI / 本地路径
      parameters:
        prompt:
          description: 图像描述。
        size:
          description: 宽高（WxH），必须为以下 7 种之一。
          enum:
            - { value: "1328x1328", ratio: "1:1" }
            - { value: "1664x928", ratio: "16:9" }
            - { value: "928x1664", ratio: "9:16" }
            - { value: "1472x1140", ratio: "4:3" }
            - { value: "1140x1472", ratio: "3:4" }
            - { value: "1584x1056", ratio: "3:2" }
            - { value: "1056x1584", ratio: "2:3" }
        n:
          description: 生成图片数量。
          default: 1
          minimum: 1
          maximum: 4
        image:
          description: 参考图 URL / data URI / 本地路径。`qwen-image-edit-2511` 必须提供。
        save_path:
          description: '可选，本地绝对文件路径。提供时自动下载并保存第一张图，返回 Saved: <path> 和 URL。'
    models:
      qwen-image-2512: Qwen/Qwen-Image-2512
      qwen-image-edit-2511: Qwen/Qwen-Image-Edit-2511
